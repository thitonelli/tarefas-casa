# ===========================
# AplicańŃo
# ===========================
spring.application.name=tarefas-app

# ===========================
# Banco de Dados (Railway + local fallback)
# ===========================
spring.datasource.url=jdbc:postgresql://${PGHOST:${DATABASE_HOST:localhost}}:${PGPORT:${DATABASE_PORT:5432}}/${PGDATABASE:${DATABASE_NAME:tarefasdb}}
spring.datasource.username=${PGUSER:${DATABASE_USER:postgres}}
spring.datasource.password=${PGPASSWORD:${DATABASE_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===========================
# Servidor
# ===========================
server.port=${PORT:8080}

# ===========================
# Timezone Brasil
# ===========================
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.serialization.write-dates-as-timestamps=false